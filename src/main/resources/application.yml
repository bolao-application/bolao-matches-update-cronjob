micronaut:
  application:
    name: bolaoMatchesUpdateCronjob
  http:
    client:
      logger-name: client
      read-timeout: ${BMUC_CLIENT_TIMEOUT:5s}
  server:
    port: ${BMUC_SERVER_PORT:8083}


netty:
  default:
    allocator:
      max-order: 3

clients:
  backend:
    api-url: ${BMUC_BACKEND_API_URL}
    base-url: ${BMUC_BACKEND_BASE_URL}
  football-data-org:
    api-url: ${BMUC_FOOTBALL_DATA_URL:`https://api.football-data.org`}
    api-key: ${BMUC_FOOTBALL_DATA_API_KEY}

user-credentials:
  auth-method: ${BMUC_AUTH_METHOD:credentials}
  login: ${BMUC_USER_LOGIN:}
  password: ${BMUC_USER_PASSWORD:}
  google:
    client-id: ${BMUC_GOOGLE_CLIENT_ID:}
    client-secret: ${BMUC_GOOGLE_CLIENT_SECRET:}
    refresh-token: ${BMUC_GOOGLE_REFRESH_TOKEN:}

feature:
  update-match-score:
    toggle: true
    cron-expression: ${BMUC_CRON_EXPRESSION:`0 */5 * * * *`}

